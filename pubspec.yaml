name: nqdi
description: "نقدي — Moroccan Darija personal budgeting app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0
  flutter: ">=3.32.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management (MVVM / clean separation of UI and logic)
  flutter_riverpod: ^2.6.1

  # Charts (pie + comparison visualisations)
  fl_chart: ^0.69.2

  # Lottie — optional richer tree/celebration animations. The current build
  # draws the tree with CustomPainter, but this is here so you can drop in a
  # Lottie file for the victory burst if desired.
  lottie: ^3.1.3

  # Number / date formatting with Arabic (ar_MA) locale support
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # Cairo typeface — matches the original web app. Download the .ttf weights
  # from Google Fonts (https://fonts.google.com/specimen/Cairo) and place them
  # under assets/fonts/ before running.
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
          weight: 400
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Cairo-Black.ttf
          weight: 900

  # Uncomment if you add a Lottie animation:
  # assets:
  #   - assets/lottie/
