# ════════════════════════════════════════════════════════════════════
#  Nqdi — CodeMagic CI/CD Pipeline
#  Builds release, split-per-ABI, tree-shaken Android APKs.
#
#  Design principle: existing source content is READ-ONLY. The pipeline
#  may EXTRACT a project .zip and/or GENERATE the missing native android/
#  scaffold (adding files), but it never edits, formats, or rewrites a
#  Dart file, asset, or pubspec. An integrity gate enforces that
#  already-tracked files are never overwritten.
# ════════════════════════════════════════════════════════════════════

workflows:
  android-release:
    name: Nqdi Android Release (split-per-abi)

    # Most efficient generally-available instance for Android-only builds.
    instance_type: linux_x2
    max_build_duration: 60

    environment:
      flutter: stable          # latest stable Flutter 3.x (bundles Dart 3.x)
      java: 17                 # required by the modern Android Gradle Plugin
      vars:
        # Stable, intentional package id. CHANGE THIS to your real org id
        # BEFORE you ship to the Play Store — it cannot be changed later.
        PACKAGE_ORG: "com.medzaaboul"
        PROJECT_NAME: "nqdi"
        FLUTTER_SUPPRESS_ANALYTICS: "true"

    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      # ── 0. Toolchain visibility ──────────────────────────────────
      - name: Print toolchain versions
        script: |
          flutter --version
          dart --version

      # ── 1. EXTRACT project .zip (runs BEFORE everything) ─────────
      #    Finds any *.zip in the repo root and extracts it (no-overwrite:
      #    committed files always win). If the zip nests everything under
      #    a top folder (e.g. nqdi_flutter/), its contents are lifted up
      #    so lib/ + pubspec.yaml land at the project root.
      - name: Extract project archive
        script: |
          set -e
          shopt -s nullglob
          zips=( *.zip )

          if [ ${#zips[@]} -eq 0 ]; then
            echo "ℹ No .zip in root — assuming source is already present."
          else
            for z in "${zips[@]}"; do
              echo "▶ Extracting $z (no-overwrite mode)…"
              unzip -n -q "$z" -d .
            done
            if [ ! -d "lib" ]; then
              nested="$(find . -maxdepth 2 -type d -name lib \
                         -not -path './lib' 2>/dev/null | head -n 1)"
              if [ -n "$nested" ]; then
                top="$(dirname "$nested")"
                echo "▶ Promoting extracted project from '$top' to root…"
                shopt -s dotglob
                mv -n "$top"/* . 2>/dev/null || true
                shopt -u dotglob
              fi
            fi
          fi

          if [ ! -d "lib" ]; then
            echo "✗ 'lib' folder not found after extraction — cannot build."
            exit 1
          fi
          echo "✓ 'lib' folder is present and accessible."

      # ── 2. GENERATE missing native android/ scaffold ─────────────
      #    The repo ships Dart sources but no android/ folder (it is
      #    machine-generated, not hand-written). `flutter create .` on an
      #    EXISTING project only ADDS the missing platform folders; it
      #    never touches lib/ or your pubspec dependencies.
      #
      #    This runs in CI each build and is NOT committed to GitHub —
      #    the scaffold is regenerated fresh every time. If you ever want
      #    to customise native config (icons, permissions, signing), it is
      #    better to commit android/ to the repo and delete this step.
      - name: Ensure android/ platform folder exists
        script: |
          set -e
          if [ -d "android" ]; then
            echo "✓ android/ already present in repo — using it as-is."
          else
            echo "▶ android/ missing — generating it with flutter create…"
            flutter create . \
              --platforms=android \
              --org "$PACKAGE_ORG" \
              --project-name "$PROJECT_NAME"
            echo "✓ android/ scaffold generated (applicationId: ${PACKAGE_ORG}.${PROJECT_NAME})."
          fi

          # Make sure the app can reach the network at runtime (release
          # builds need INTERNET declared in the main manifest). Only
          # appended if missing; never duplicated.
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ] && ! grep -q 'android.permission.INTERNET' "$MANIFEST"; then
            echo "▶ Adding INTERNET permission to main manifest…"
            sed -i 's#<manifest \(.*\)>#<manifest \1>\n    <uses-permission android:name="android.permission.INTERNET"/>#' "$MANIFEST"
          fi

      # ── 3. Sanity-check effective intl constraint ────────────────
      - name: Show effective intl constraint
        script: |
          echo "▶ intl constraint in the pubspec that will actually be used:"
          grep -nE '^\s*intl\s*:' pubspec.yaml || echo "  (intl not pinned — SDK transitive only, fine)"

      # ── 4. SELF-HEALING PRE-BUILD (environment auto-fixer) ───────
      #    Touches ONLY machine state: build output, global pub cache,
      #    and the resolved dependency tree. Never tracked source.
      - name: Pre-build self-heal (clean / cache repair / fresh deps)
        script: |
          set -e
          echo "▶ flutter clean"
          flutter clean
          echo "▶ flutter pub cache repair"
          flutter pub cache repair
          echo "▶ flutter pub get"
          flutter pub get

      # ── 5. Read-only integrity gate (protects YOUR source) ───────
      #    Fails the build if a TRACKED source file was modified. The
      #    generated android/ scaffold and a refreshed pubspec.lock are
      #    untracked / generated, so they are correctly allowed.
      - name: Verify tracked source is unmodified
        script: |
          set -e
          changed="$(git diff --name-only -- . ':(exclude)pubspec.lock')"
          staged="$(git diff --cached --name-only -- . ':(exclude)pubspec.lock')"
          if [ -n "$changed$staged" ]; then
            echo "✗ Tracked source changed during pre-build — aborting:"
            echo "$changed$staged"
            exit 1
          fi
          echo "✓ No tracked source files were modified."

      # ── 6. BUILD — release, split-per-ABI, tree-shaken icons ─────
      - name: Build release APKs
        script: |
          set -e
          flutter build apk --release --split-per-abi --tree-shake-icons

    # ── 7. ARTIFACTS — surfaced in the CodeMagic build summary ─────
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/apk/release/*.apk
      - build/app/outputs/mapping/release/mapping.txt

    publishing:
      email:
        recipients:
          - your-email@example.com   # ← replace with your address
        notify:
          success: true
          failure: true
