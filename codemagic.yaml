# ════════════════════════════════════════════════════════════════════
#  Nqdi — CodeMagic CI/CD Pipeline  (robust-extract edition)
#  Builds release, split-per-ABI, tree-shaken Android APKs.
#
#  This version makes the .zip extraction bullet-proof and VERBOSE:
#  it prints what is inside the archive and what lands at the project
#  root, so any failure is diagnosable from the log. The android/
#  folder is generated by flutter create if missing.
# ════════════════════════════════════════════════════════════════════

workflows:
  android-release:
    name: Nqdi Android Release (split-per-abi)

    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      flutter: stable
      java: 17
      vars:
        PACKAGE_ORG: "com.medzaaboul"
        PROJECT_NAME: "nqdi"
        FLUTTER_SUPPRESS_ANALYTICS: "true"

    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      # ── 0. Toolchain + initial repo listing ──────────────────────
      - name: Print toolchain and repo contents
        script: |
          flutter --version
          echo "──────── repo root BEFORE extraction ────────"
          ls -la
          echo "─────────────────────────────────────────────"

      # ── 1. ROBUST EXTRACT of the project .zip ────────────────────
      #    Verbose, fault-tolerant extraction. Prints the archive's
      #    contents, extracts it, then guarantees lib/ + pubspec.yaml
      #    sit at the project root no matter how the zip is nested.
      - name: Extract project archive (robust)
        script: |
          set -e

          # Portable: works on the macOS runner's old bash (3.x), no
          # `mapfile`, and no pipe-into-while (which would lose state in a
          # subshell). A plain glob loop over root-level zips.
          shopt -s nullglob 2>/dev/null || true
          zip_count=0
          for z in ./*.zip; do
            [ -f "$z" ] || continue
            zip_count=$((zip_count + 1))
            echo "════════ Found archive: $z ════════"
            echo "── Archive contents: ──"
            unzip -l "$z" | head -n 60
            echo "── Extracting into a temp folder… ──"
            tmp="$(mktemp -d)"
            unzip -o -q "$z" -d "$tmp"

            # Find lib/ INSIDE the extracted tree (any depth).
            libdir="$(find "$tmp" -type d -name lib | head -n 1)"
            if [ -z "$libdir" ]; then
              echo "⚠ No lib/ inside $z — skipping this archive."
              rm -rf "$tmp"
              continue
            fi

            # The Flutter project root is the parent of lib/.
            projroot="$(dirname "$libdir")"
            echo "── Project root inside archive: $projroot ──"

            # Copy the project's contents up to repo root.
            # -n = never overwrite a file already committed in the repo.
            echo "── Copying project files to repo root (no-overwrite)… ──"
            cp -Rn "$projroot"/* . 2>/dev/null || true
            # also copy hidden files (e.g. .gitignore, .metadata) if any
            cp -Rn "$projroot"/.[!.]* . 2>/dev/null || true
            rm -rf "$tmp"
          done

          if [ "$zip_count" -eq 0 ]; then
            echo "ℹ No .zip found at repo root — assuming source is already unpacked."
          fi

          echo "──────── repo root AFTER extraction ────────"
          ls -la
          echo "────────────────────────────────────────────"

          if [ ! -d "lib" ]; then
            echo "✗ FATAL: 'lib' still missing after extraction."
            echo "  The zip either has no lib/ folder or is corrupt."
            exit 1
          fi
          if [ ! -f "pubspec.yaml" ]; then
            echo "✗ FATAL: pubspec.yaml missing at repo root."
            exit 1
          fi
          echo "✓ lib/ and pubspec.yaml are present at the project root."
          echo "── lib/ tree: ──"
          find lib -type f | head -n 40

      # ── 2. GENERATE missing native android/ scaffold ─────────────
      - name: Ensure android/ platform folder exists
        script: |
          set -e
          if [ -d "android" ]; then
            echo "✓ android/ already present — using it."
          else
            echo "▶ Generating android/ with flutter create…"
            flutter create . \
              --platforms=android \
              --org "$PACKAGE_ORG" \
              --project-name "$PROJECT_NAME"
            echo "✓ android/ generated (applicationId: ${PACKAGE_ORG}.${PROJECT_NAME})."
          fi

          # Ensure the app can use the network at runtime. Recent Flutter
          # templates already add INTERNET to the main manifest, so this is
          # usually a no-op. We use awk (identical on macOS & Linux) instead
          # of sed, whose -i syntax differs between the two platforms.
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ] && ! grep -q 'android.permission.INTERNET' "$MANIFEST"; then
            echo "▶ Adding INTERNET permission…"
            awk '{
              print $0
            }
            /<manifest[ >]/ && !done {
              print "    <uses-permission android:name=\"android.permission.INTERNET\"/>"
              done=1
            }' "$MANIFEST" > "$MANIFEST.tmp" && mv "$MANIFEST.tmp" "$MANIFEST"
            echo "✓ INTERNET permission added."
          else
            echo "✓ INTERNET permission already present (or manifest not found yet)."
          fi

      # ── 3. FETCH the Cairo variable font declared in pubspec.yaml ─
      #    The repo ships Dart code but not the Cairo font (a large binary).
      #    Cairo on Google Fonts is a VARIABLE font: one file holds every
      #    weight (200–1000). We download that single official file from
      #    github.com/google/fonts (OFL licensed). Flutter reads all the
      #    weights it needs from this one file. Kept if already in the repo.
      - name: Ensure Cairo font is present
        script: |
          set -e
          FONT_DIR="assets/fonts"
          mkdir -p "$FONT_DIR"
          TARGET="$FONT_DIR/Cairo-Variable.ttf"

          if [ -f "$TARGET" ]; then
            echo "✓ Cairo-Variable.ttf already present — keeping it."
          else
            echo "▶ Downloading Cairo variable font…"
            URL="https://github.com/google/fonts/raw/main/ofl/cairo/Cairo%5Bslnt%2Cwght%5D.ttf"
            curl -fsSL "$URL" -o "$TARGET"
            bytes=$(wc -c < "$TARGET")
            if [ "$bytes" -lt 20000 ]; then
              echo "✗ Download failed — file too small ($bytes bytes)."
              echo "  (The Google Fonts path may have changed.)"
              exit 1
            fi
            echo "✓ Cairo-Variable.ttf downloaded ($bytes bytes)."
          fi

          echo "── Fonts in $FONT_DIR: ──"
          ls -la "$FONT_DIR"

      # ── 4. SELF-HEALING PRE-BUILD (environment auto-fixer) ───────
      - name: Pre-build self-heal (clean / cache repair / fresh deps)
        script: |
          set -e
          flutter clean
          flutter pub cache repair
          flutter pub get

      # ── 5. BUILD — release, split-per-ABI, tree-shaken icons ─────
      - name: Build release APKs
        script: |
          set -e
          flutter build apk --release --split-per-abi --tree-shake-icons

    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/apk/release/*.apk
      - build/app/outputs/mapping/release/mapping.txt

    publishing:
      email:
        recipients:
          - your-email@example.com   # ← replace with your address
        notify:
          success: true
          failure: true
